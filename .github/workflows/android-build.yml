name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('app/**/*.gradle.kts', 'app/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x app/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: app

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: racing-bank-debug-${{ github.sha }}
          path: app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Publish to latest release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git tag -f latest
          git push origin latest --force
          gh release create latest \
            app/app/build/outputs/apk/debug/app-debug.apk \
            --title "Latest Build" \
            --notes "**Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          **Built at:** $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --prerelease
