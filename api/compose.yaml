services:
  # Database service
  db:
    image: mariadb:11
    restart: unless-stopped
    command: --transaction-isolation=READ-UNCOMMITTED
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_NAME:-bankao}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - bankao_net
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -p${DB_ROOT_PASSWORD:-rootpassword} --silent" ]
      interval: 4s
      timeout: 1s
      retries: 60

  # API service
  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database connection
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      DB_NAME: ${DB_NAME:-bankao}

      # JWT configuration
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - bankao_net
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  bankao_net:
    name: bankao_net
    driver: bridge

volumes:
  db_data:
    driver: local
